<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card</title>

  <!-- Correct CSS -->
  <link rel="stylesheet" href="./css/todo.css">
</head>

<body>

<!-- Back button MUST be inside body -->
<a href="./index.html" class="back-btn" data-testid="back-button">⬅</a>

<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span>
</div>

<article data-testid="test-todo-card" class="card fade-in">

  <!-- Checkbox -->
  <input 
    id="todo-check" 
    type="checkbox" 
    data-testid="test-todo-complete-toggle">

  <label for="todo-check">Mark as complete</label>

  <!-- Title -->
  <h2 data-testid="test-todo-title">Finish Frontend Challenge</h2>

  <!-- Description -->
  <p data-testid="test-todo-description">
    Build a clean and testable todo card component.
  </p>

  <!-- Priority -->
  <span data-testid="test-todo-priority" aria-label="Priority: High">
    High
  </span>

  <!-- Status -->
  <span data-testid="test-todo-status" aria-label="Status: Pending">
    Pending
  </span>

  <!-- Due Date -->
  <time 
    data-testid="test-todo-due-date"
    datetime="2026-04-14T18:00:00Z">
    Due April 14, 2026
  </time>

  <!-- Time Remaining -->
  <time 
    data-testid="test-todo-time-remaining"
    aria-live="polite">
    Calculating...
  </time>

  <!-- Tags -->
  <ul data-testid="test-todo-tags">
    <li data-testid="test-todo-tag-work">Work</li>
    <li data-testid="test-todo-tag-urgent">Urgent</li>
  </ul>

  <!-- Buttons -->
  <button data-testid="test-todo-edit-button">Edit</button>
  <button data-testid="test-todo-delete-button">Delete</button>

</article>

<!-- Correct JS -->
<script src="./js/todo.js"></script>

</body>
</html>
