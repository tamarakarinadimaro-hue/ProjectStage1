<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Stage 1 Portfolio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0033, #1a0066);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    a {
      text-decoration: none;
      background: white;
      color: black;
      padding: 16px 24px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    a:hover {
      transform: scale(1.05);
      background: #ddd;
    }
  </style>
</head>

<body>

  <h1>Stage 1 Portfolio 🚀</h1>

  <div class="container">
    <a href="./profile.html">Profile Card</a>
    <a href="./todo.html">Todo App</a>
  </div>

</html>
